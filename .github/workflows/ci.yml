name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q

  build-installer:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e . pyinstaller
      # Stamp the build version: tag builds -> the tag; others -> 0.0.0+sha.
      - name: Generate _buildinfo.py + version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -like 'refs/tags/v*') { $ver = $ref -replace '^refs/tags/v','' }
          else { $ver = "0.0.0+$('${{ github.sha }}'.Substring(0,7))" }
          "BUILD_VERSION = `"$ver`"`nGIT_SHA = `"${{ github.sha }}`"`n" | Out-File -Encoding ascii agent/_buildinfo.py
          ($ver -split '\+')[0] | Out-File -Encoding ascii version.txt   # numeric-only for the installer
          Get-Content agent/_buildinfo.py
      - name: Make icon
        run: python packaging/make_icon.py packaging/icon.ico
      # Windowed (no console) onedir build — the tray app. onedir is friendlier
      # to package than onefile.
      - name: Build windowed tray app
        run: >
          pyinstaller --noconfirm --onedir --windowed --name ufo-agent
          --icon packaging/icon.ico
          --hidden-import agent._buildinfo
          packaging/entry_agent.py
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress | Out-Null
          $ver = (Get-Content version.txt).Trim()
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$ver packaging\ufo-agent.iss
          Get-ChildItem installer
      - name: Publish sha256
        shell: pwsh
        run: |
          $h = (Get-FileHash installer/ufo-agent-setup.exe -Algorithm SHA256).Hash.ToLower()
          "$h  ufo-agent-setup.exe" | Out-File -Encoding ascii installer/ufo-agent-setup.exe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ufo-agent-setup
          path: |
            installer/ufo-agent-setup.exe
            installer/ufo-agent-setup.exe.sha256

  # Publish the download page WITH the freshly built installer onto GitHub Pages.
  pages:
    if: github.ref == 'refs/heads/main'
    needs: build-installer
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ufo-agent-setup
          path: dist
      - name: Assemble site (landing page + the built installer)
        run: |
          mkdir -p _site
          cp web/index.html _site/index.html
          cp dist/ufo-agent-setup.exe _site/ufo-agent-setup.exe
          cp dist/ufo-agent-setup.exe.sha256 _site/ufo-agent-setup.exe.sha256
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-installer
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ufo-agent-setup
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ufo-agent-setup.exe
            ufo-agent-setup.exe.sha256
          generate_release_notes: true
